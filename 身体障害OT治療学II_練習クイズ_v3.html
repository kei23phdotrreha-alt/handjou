<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>身体障害OT治療学II 練習クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap');

  :root {
    --navy: #1E2761;
    --navy-dark: #141a47;
    --navy-light: #2d3a8c;
    --gold: #C9A84C;
    --gold-light: #e4c06e;
    --gold-dark: #a07a2a;
    --red: #c0392b;
    --bg: #0f1535;
    --surface: #1a2456;
    --surface2: #202d6a;
    --text: #eef0f8;
    --text-muted: #8892cc;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --border: rgba(201,168,76,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(30,39,97,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { position: relative; z-index: 1; min-height: 100vh; }

  /* ===== HOME ===== */
  #home {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  .logo-badge {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'Oswald', sans-serif;
  }

  .home-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(24px, 6vw, 40px);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 8px;
    color: #fff;
  }

  .home-title span { color: var(--gold); }

  .home-subtitle {
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    margin-bottom: 36px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-card.wide { grid-column: span 2; }

  .stat-value {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }

  .weak-alert {
    width: 100%;
    max-width: 400px;
    background: rgba(192,57,43,0.12);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
  }

  .weak-alert-title { color: #e87c7c; font-weight: 700; margin-bottom: 6px; font-size: 12px; letter-spacing: 1px; }

  .weak-tag {
    display: inline-block;
    background: rgba(192,57,43,0.2);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    color: #e87c7c;
    margin: 2px;
  }

  .mode-list {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }

  .mode-card:hover, .mode-card:active {
    background: var(--surface2);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  .mode-card.disabled { opacity: 0.4; cursor: default; pointer-events: none; }

  .mode-icon { font-size: 28px; flex-shrink: 0; }
  .mode-info { flex: 1; }
  .mode-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .mode-desc { font-size: 12px; color: var(--text-muted); }
  .mode-arrow { color: var(--gold); font-size: 18px; flex-shrink: 0; }

  /* Section select */
  .section-select-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Oswald', sans-serif;
    width: 100%;
    max-width: 400px;
  }

  .section-btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 24px;
  }

  .section-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: left;
    line-height: 1.4;
  }

  .section-btn:hover { background: var(--surface2); border-color: var(--gold); color: var(--text); }
  .section-btn .sb-icon { font-size: 16px; display: block; margin-bottom: 4px; }
  .section-btn .sb-name { font-weight: 700; font-size: 12px; color: var(--text); display: block; }
  .section-btn .sb-count { font-size: 10px; }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  /* ===== QUIZ ===== */
  #quiz { display: none; flex-direction: column; min-height: 100vh; }

  .quiz-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  .progress-wrap { flex: 1; }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy-light), var(--gold));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .score-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 13px;
    font-family: 'Oswald', sans-serif;
    color: var(--gold);
    flex-shrink: 0;
  }

  .quiz-body {
    flex: 1;
    padding: 20px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .section-tag {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 12px;
    font-family: 'Oswald', sans-serif;
  }

  .question-text {
    font-size: clamp(15px, 3.5vw, 18px);
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 24px;
    color: #fff;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .option-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--gold-dark); }

  .option-letter {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 1px;
    min-width: 18px;
  }

  .option-btn.correct { background: rgba(39,174,96,0.15); border-color: var(--correct); }
  .option-btn.correct .option-letter { color: var(--correct); }
  .option-btn.wrong { background: rgba(231,76,60,0.15); border-color: var(--wrong); }
  .option-btn.wrong .option-letter { color: var(--wrong); }
  .option-btn.reveal-correct { border-color: var(--correct); background: rgba(39,174,96,0.08); }
  .option-btn:disabled { cursor: default; }

  .explanation-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: none;
  }

  .explanation-box strong {
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .next-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--navy-light), var(--navy));
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .next-btn:hover { background: linear-gradient(135deg, var(--navy), var(--navy-dark)); transform: translateY(-1px); }

  /* ===== RESULT ===== */
  #result { display: none; flex-direction: column; align-items: center; padding: 40px 20px 60px; }

  .result-title { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; color: var(--gold); margin-bottom: 4px; margin-top: 20px; }
  .result-subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }

  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    background: var(--surface);
    box-shadow: 0 0 30px rgba(201,168,76,0.15);
  }

  .score-pct { font-family: 'Oswald', sans-serif; font-size: 40px; font-weight: 700; color: var(--gold); line-height: 1; }
  .score-pct-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 28px;
  }

  .result-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; }
  .result-stat-val { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .result-stat-val.c { color: var(--correct); }
  .result-stat-val.w { color: var(--wrong); }
  .result-stat-val.t { color: var(--gold); }
  .result-stat-label { font-size: 10px; color: var(--text-muted); }

  .section-breakdown { width: 100%; max-width: 400px; margin-bottom: 28px; }
  .section-breakdown-title { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-family: 'Oswald', sans-serif; }

  .section-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
  .section-name { flex: 1; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .section-bar-wrap { flex: 2; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .section-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .section-pct { width: 36px; text-align: right; font-family: 'Oswald', sans-serif; font-size: 13px; color: var(--gold); flex-shrink: 0; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }

  .result-btn {
    border-radius: 12px;
    padding: 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid;
    text-align: center;
  }

  .result-btn.primary { background: linear-gradient(135deg, var(--navy-light), var(--navy)); border-color: var(--gold); color: var(--gold); }
  .result-btn.secondary { background: transparent; border-color: rgba(201,168,76,0.3); color: var(--text-muted); }
  .result-btn:hover { transform: translateY(-1px); opacity: 0.9; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quiz-body { animation: slideUp 0.3s ease; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="logo-badge">東京保健医療専門職大学</div>
  <div class="home-title">身体障害OT治療学II<br><span>練習クイズ</span></div>
  <div class="home-subtitle">第1〜7回 ｜ 87問 ｜ 5択形式</div>

  <div class="stats-grid">
    <div class="stat-card wide">
      <div class="stat-value" id="home-accuracy">—%</div>
      <div class="stat-label">累計正答率</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="home-attempts">0回</div>
      <div class="stat-label">挑戦回数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="home-weak">0問</div>
      <div class="stat-label">苦手問題数</div>
    </div>
  </div>

  <div class="weak-alert" id="weak-alert" style="display:none;">
    <div class="weak-alert-title">⚠ 苦手セクション（正答率50%未満）</div>
    <div id="weak-tags"></div>
  </div>

  <div class="mode-list">
    <div class="mode-card" onclick="startQuiz('all')">
      <div class="mode-icon">🎲</div>
      <div class="mode-info">
        <div class="mode-name">全87問ランダム</div>
        <div class="mode-desc">すべての問題をシャッフル出題</div>
      </div>
      <div class="mode-arrow">→</div>
    </div>
    <div class="mode-card" id="weak-mode-card" onclick="startQuiz('weak')">
      <div class="mode-icon">🎯</div>
      <div class="mode-info">
        <div class="mode-name">苦手問題のみ</div>
        <div class="mode-desc">正答率50%未満の問題を集中練習</div>
      </div>
      <div class="mode-arrow">→</div>
    </div>
  </div>

  <div class="section-select-title">📚 セクション別練習</div>
  <div class="section-btn-grid" id="section-btn-grid">
    <!-- injected by JS -->
  </div>

  <button class="reset-btn" onclick="resetHistory()">履歴をリセット</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen" style="display:none; flex-direction:column;">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="q-label">問題 1 / 87</span>
        <span id="q-mode-label">全問モード</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="score-badge" id="score-badge">0 / 0</div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
</div>

<!-- RESULT -->
<div id="result" class="screen" style="display:none; flex-direction:column; align-items:center; padding:40px 20px 60px;">
  <div class="logo-badge">結果発表</div>
  <div class="score-circle">
    <div class="score-pct" id="res-pct">0%</div>
    <div class="score-pct-label">正答率</div>
  </div>
  <div class="result-title" id="res-grade">—</div>
  <div class="result-subtitle" id="res-msg"></div>
  <div class="result-stats">
    <div class="result-stat"><div class="result-stat-val c" id="res-correct">0</div><div class="result-stat-label">正解</div></div>
    <div class="result-stat"><div class="result-stat-val w" id="res-wrong">0</div><div class="result-stat-label">不正解</div></div>
    <div class="result-stat"><div class="result-stat-val t" id="res-total">0</div><div class="result-stat-label">出題数</div></div>
  </div>
  <div class="section-breakdown">
    <div class="section-breakdown-title">📊 セクション別正答率</div>
    <div id="section-breakdown-list"></div>
  </div>
  <div class="result-actions">
    <div class="result-btn primary" onclick="startQuiz('all')">もう一度（全問）</div>
    <div class="result-btn secondary" onclick="startQuiz('weak')">苦手問題を集中練習</div>
    <div class="result-btn secondary" onclick="goHome()">ホームへ戻る</div>
  </div>
</div>

<script>
// ============================================================
// QUESTION DATA — 70問 5択
// ============================================================
const QUESTIONS = [
  // ── Section 1: ICF（第1回）──
  {
    section: "ICF・基礎",
    q: "ICFはWHOが何年に発表した国際分類か？",
    options: ["1980年", "1990年", "2001年", "2010年", "2020年"],
    ans: 2,
    exp: "ICF（国際生活機能分類）はWHO が2001年に発表。1980年はICIDH（国際障害分類）。"
  },
  {
    section: "ICF・基礎",
    q: "ICIDHのモデルに関する記述として正しいのはどれか？",
    options: [
      "双方向・相互作用モデルである",
      "環境因子を考慮している",
      "一方向・線形モデルであり障害を個人の問題として捉える",
      "参加を重視した分類である",
      "2001年にWHOが発表した"
    ],
    ans: 2,
    exp: "ICIDH（1980年）は「疾患→機能障害→能力障害→社会的不利」という一方向の線形モデルで、障害を個人の問題として捉える。"
  },
  {
    section: "ICF・基礎",
    q: "ICFにおける「活動（Activity）」の能力（Capacity）の説明として正しいのはどれか？",
    options: [
      "実際の生活場面での遂行を指す",
      "最悪の環境での最小能力を指す",
      "標準化された環境でのその人の最大能力を指す",
      "社会への参加状況を指す",
      "環境因子の促進効果のことである"
    ],
    ans: 2,
    exp: "能力（Capacity）は標準化された環境（例：入院中の病棟）でその人が「できる」最大の能力。実行状況（Performance）は実際の生活場面での遂行。"
  },
  {
    section: "ICF・基礎",
    q: "ICFにおける「参加（Participation）」の例として最も適切なのはどれか？",
    options: [
      "右肩ROM制限",
      "歩行中のバランス保持",
      "FIMで整容4点",
      "大工として職場復帰する",
      "筋力低下（MMT 3）"
    ],
    ans: 3,
    exp: "参加は生活・人生場面への関わり（社会・役割・人間関係）。職場復帰は参加の典型例。ROM制限・筋力低下は心身機能、FIMは活動レベル。"
  },
  {
    section: "ICF・基礎",
    q: "ICFの環境因子について正しい記述はどれか？",
    options: [
      "促進因子のみを評価対象とする",
      "年齢・性別・価値観が含まれる",
      "物的環境・人的環境・制度サービス・社会的態度などが含まれ、促進因子と阻害因子の両面を評価する",
      "ICFでは分類されておらず臨床のみで使用する",
      "身体的な疾患状態を指す"
    ],
    ans: 2,
    exp: "環境因子には物的環境・人的環境・制度・社会的態度などが含まれ、促進因子(+)と阻害因子(-)の両面から評価する。年齢・価値観は個人因子。"
  },
  {
    section: "ICF・基礎",
    q: "OTにおけるICF活用で「能力と実行状況のギャップ」に関する説明として正しいのはどれか？",

// ============================================================
// SECTION ICONS
// ============================================================
const SECTION_META = {
  "ICF・基礎":      { icon: "🧩", count: 6 },
  "手・上肢の解剖": { icon: "✋", count: 10 },
  "骨折の作業療法": { icon: "🦴", count: 10 },
  "橈骨遠位端骨折": { icon: "💪", count: 10 },
  "複合・応用":     { icon: "📝", count: 13 },
  "ばね指":         { icon: "👆", count: 10 },
  "母指CM関節症":   { icon: "👍", count: 8 },
  "屈筋腱損傷":     { icon: "✊", count: 10 },
  "伸筋腱損傷":     { icon: "🖐", count: 10 },
};

// ============================================================
// APP STATE & STORAGE
// ============================================================
const STORAGE_KEY = 'ot_quiz_v3';

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { attempts: 0, correct_total: 0, total: 0, per_q: {} };
  } catch { return { attempts: 0, correct_total: 0, total: 0, per_q: {} }; }
}

function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

let data = loadData();
let currentQueue = [];
let currentIdx = 0;
let sessionCorrect = 0;
let sessionTotal = 0;
let sessionMode = 'all';

function getSectionStats() {
  const sections = {};
  QUESTIONS.forEach((q, i) => {
    if (!sections[q.section]) sections[q.section] = { correct: 0, total: 0 };
    const pd = data.per_q[i] || { c: 0, t: 0 };
    sections[q.section].correct += pd.c;
    sections[q.section].total += pd.t;
  });
  return sections;
}

function getWeakQuestions() {
  return QUESTIONS.map((q, i) => {
    const pd = data.per_q[i] || { c: 0, t: 0 };
    const rate = pd.t > 0 ? pd.c / pd.t : null;
    return { idx: i, rate };
  }).filter(x => x.rate !== null && x.rate < 0.5);
}

// ============================================================
// HOME
// ============================================================
function renderHome() {
  data = loadData();
  const total = data.total;
  const acc = total > 0 ? Math.round(data.correct_total / total * 100) : null;
  document.getElementById('home-accuracy').textContent = acc !== null ? acc + '%' : '—%';
  document.getElementById('home-attempts').textContent = data.attempts + '回';

  const weakQs = getWeakQuestions();
  document.getElementById('home-weak').textContent = weakQs.length + '問';

  const secStats = getSectionStats();
  const weakSections = Object.entries(secStats).filter(([, v]) => v.total > 0 && v.correct / v.total < 0.5);
  const alertEl = document.getElementById('weak-alert');
  if (weakSections.length > 0) {
    alertEl.style.display = '';
    document.getElementById('weak-tags').innerHTML = weakSections.map(([name]) =>
      `<span class="weak-tag">${name}</span>`).join('');
  } else {
    alertEl.style.display = 'none';
  }

  const weakCard = document.getElementById('weak-mode-card');
  weakCard.classList.toggle('disabled', weakQs.length === 0);

  // Section buttons
  const grid = document.getElementById('section-btn-grid');
  const sections = [...new Set(QUESTIONS.map(q => q.section))];
  grid.innerHTML = sections.map(sec => {
    const meta = SECTION_META[sec] || { icon: '📖', count: '?' };
    const st = secStats[sec] || { correct: 0, total: 0 };
    const pct = st.total > 0 ? Math.round(st.correct / st.total * 100) + '%' : '未挑戦';
    return `<button class="section-btn" onclick="startQuiz('section','${sec}')">
      <span class="sb-icon">${meta.icon}</span>
      <span class="sb-name">${sec}</span>
      <span class="sb-count">${meta.count}問 · ${pct}</span>
    </button>`;
  }).join('');
}

function showScreen(id) {
  ['home','quiz','result'].forEach(s => document.getElementById(s).style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}

function goHome() {
  showScreen('home');
  renderHome();
}

function resetHistory() {
  if (!confirm('学習履歴をリセットしますか？')) return;
  localStorage.removeItem(STORAGE_KEY);
  data = loadData();
  renderHome();
}

// ============================================================
// QUIZ
// ============================================================
function startQuiz(mode, sectionName) {
  data = loadData();
  sessionMode = mode;
  sessionCorrect = 0;
  sessionTotal = 0;

  if (mode === 'weak') {
    const weakQs = getWeakQuestions();
    if (weakQs.length === 0) { alert('苦手問題がありません。全問モードで練習してください。'); return; }
    currentQueue = shuffle(weakQs.map(x => x.idx));
  } else if (mode === 'section') {
    currentQueue = shuffle(
      QUESTIONS.map((q, i) => ({ q, i }))
        .filter(x => x.q.section === sectionName)
        .map(x => x.i)
    );
    sessionMode = sectionName;
  } else {
    currentQueue = shuffle(QUESTIONS.map((_, i) => i));
  }

  currentIdx = 0;
  data.attempts += 1;
  saveData(data);

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const qIdx = currentQueue[currentIdx];
  const q = QUESTIONS[qIdx];
  const total = currentQueue.length;

  document.getElementById('q-label').textContent = `問題 ${currentIdx + 1} / ${total}`;
  const modeLabel = sessionMode === 'weak' ? '苦手集中' : sessionMode === 'all' ? '全問' : sessionMode;
  document.getElementById('q-mode-label').textContent = modeLabel + 'モード';
  document.getElementById('progress-fill').style.width = (currentIdx / total * 100) + '%';
  document.getElementById('score-badge').textContent = `${sessionCorrect} / ${sessionTotal}`;

  const letters = ['A', 'B', 'C', 'D', 'E'];
  const html = `
    <div class="section-tag">${q.section}</div>
    <div class="question-text">Q${currentIdx + 1}. ${q.q}</div>
    <div class="options-list">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectAnswer(${i}, ${q.ans}, ${qIdx})" id="opt-${i}">
          <span class="option-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation-box" id="exp-box">
      <strong>📝 解説</strong>
      ${q.exp}
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      ${currentIdx + 1 < currentQueue.length ? '次の問題 →' : '結果を見る →'}
    </button>
  `;

  const body = document.getElementById('quiz-body');
  body.innerHTML = html;
  body.scrollTop = 0;
  body.style.animation = 'none';
  requestAnimationFrame(() => { body.style.animation = 'slideUp 0.3s ease'; });
}

function selectAnswer(selected, correct, qIdx) {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  document.querySelectorAll('.option-btn')[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) document.querySelectorAll('.option-btn')[correct].classList.add('reveal-correct');

  if (!data.per_q[qIdx]) data.per_q[qIdx] = { c: 0, t: 0 };
  data.per_q[qIdx].t += 1;
  if (isCorrect) data.per_q[qIdx].c += 1;

  sessionTotal += 1;
  if (isCorrect) sessionCorrect += 1;
  data.correct_total = (data.correct_total || 0) + (isCorrect ? 1 : 0);
  data.total = (data.total || 0) + 1;
  saveData(data);

  document.getElementById('score-badge').textContent = `${sessionCorrect} / ${sessionTotal}`;
  document.getElementById('exp-box').style.display = '';
  document.getElementById('next-btn').style.display = '';
  document.getElementById('next-btn').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion() {
  currentIdx += 1;
  if (currentIdx >= currentQueue.length) showResult();
  else renderQuestion();
}

// ============================================================
// RESULT
// ============================================================
function showResult() {
  const pct = sessionTotal > 0 ? Math.round(sessionCorrect / sessionTotal * 100) : 0;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-correct').textContent = sessionCorrect;
  document.getElementById('res-wrong').textContent = sessionTotal - sessionCorrect;
  document.getElementById('res-total').textContent = sessionTotal;

  let grade, msg;
  if (pct >= 90) { grade = 'EXCELLENT！'; msg = '素晴らしい！ほぼ完璧です。'; }
  else if (pct >= 75) { grade = 'GREAT！'; msg = '良い結果です。苦手分野を復習しましょう。'; }
  else if (pct >= 60) { grade = 'GOOD'; msg = 'もう少しです。苦手問題を集中練習しましょう。'; }
  else { grade = 'KEEP STUDYING'; msg = '資料を見直して再チャレンジしてください。'; }

  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-msg').textContent = msg;

  const secStats = getSectionStats();
  const listEl = document.getElementById('section-breakdown-list');
  listEl.innerHTML = Object.entries(secStats).map(([name, v]) => {
    const p = v.total > 0 ? Math.round(v.correct / v.total * 100) : 0;
    const color = p >= 75 ? '#27ae60' : p >= 50 ? '#e67e22' : '#e74c3c';
    return `
      <div class="section-row">
        <div class="section-name">${name}</div>
        <div class="section-bar-wrap">
          <div class="section-bar-fill" style="width:${p}%;background:${color}"></div>
        </div>
        <div class="section-pct">${v.total > 0 ? p + '%' : '—'}</div>
      </div>`;
  }).join('');

  showScreen('result');
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// INIT
// ============================================================
renderHome();
</script>
